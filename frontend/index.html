<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Silni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔢 Kalkulator Silni</h1>
        
        <div class="input-group">
            <label for="liczba">Podaj liczbę:</label>
            <input type="number" id="liczba" placeholder="Wpisz liczbę" min="0">
        </div>
        
        <button onclick="obliczSilnie()">Oblicz Silnię</button>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="result-label">Wynik:</div>
            <div class="result-value" id="wynik"></div>
        </div>

        <div class="info">
            <p>Backend: <span id="backend-status" class="status">Łączenie...</span></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
